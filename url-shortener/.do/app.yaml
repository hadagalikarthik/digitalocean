name: url-shortener
region: nyc
services:
  - name: api
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    image:
      registry_type: DOCR
      repository: url-shortener
      tag: latest
    routes:
      - path: /
    envs:
      - key: ENVIRONMENT
        value: production
      - key: BASE_URL
        scope: RUN_TIME
        type: GENERAL
        value: ${BASE_URL}
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET
      - key: SHORT_CODE_LENGTH
        value: "7"
      - key: CACHE_TTL_SECONDS
        value: "300"
      - key: IDEMPOTENCY_TTL_SECONDS
        value: "86400"
    health_check:
      http_path: /health

# Create managed Postgres + Redis in the DO control panel (or via doctl databases),
# then set DATABASE_URL and REDIS_URL as app secrets / env vars.
# Example:
#   doctl apps create --spec .do/app.yaml
